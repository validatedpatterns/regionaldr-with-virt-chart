---
- name: Apply Ramen hub CA from cluster-proxy-ca-bundle (after MirrorPeer / s3 profiles)
  ansible.builtin.command:
    argv:
      - bash
      - "{{ role_path }}/files/odf-ramen-trusted-ca.sh"
  environment:
    WORK_DIR: "{{ odf_ramen_trusted_ca_work_dir }}"
    RAMEN_CM_WAIT_SECONDS: "{{ odf_ramen_s3_wait_seconds | string }}"
    TRUSTED_CA_WAIT_SECONDS: "{{ odf_ramen_trusted_ca_wait_seconds | string }}"
    POLL_INTERVAL: "{{ odf_ramen_poll_interval | string }}"
  changed_when: true
