---
- name: Run Submariner prerequisites check
  ansible.builtin.command:
    argv:
      - bash
      - "{{ role_path }}/files/submariner-prerequisites-check.sh"
  environment:
    PRIMARY_CLUSTER: "{{ primary_cluster }}"
    SECONDARY_CLUSTER: "{{ secondary_cluster }}"
    SUBMARINER_BROKER_NAMESPACE: "{{ submariner_broker_namespace }}"
  register: submariner_prereq
  changed_when: false
  failed_when: false

- name: Promote Submariner prerequisites script failure to Ansible output
  ansible.builtin.debug:
    msg: |-
      Submariner prerequisites script exited with rc={{ submariner_prereq.rc }}.
      ========== stderr ==========
      {{ submariner_prereq.stderr | default('', true) }}
      ========== stdout (full) ==========
      {{ submariner_prereq.stdout | default('', true) }}
  when: submariner_prereq.rc != 0

- name: Fail play when Submariner prerequisites script failed
  ansible.builtin.fail:
    msg: >-
      Submariner prerequisites script exited with rc={{ submariner_prereq.rc }}.
      Full stdout/stderr were printed in the previous debug task.
  when: submariner_prereq.rc != 0

- name: Promote recent Submariner output after long retry run (tail of stdout)
  ansible.builtin.debug:
    msg: |-
      Submariner prerequisites succeeded (rc=0); last 8000 characters of script output:
      {{ (submariner_prereq.stdout | default(''))[-8000:] }}
  when:
    - submariner_prereq.rc == 0
    - (submariner_prereq.stdout | default('') | length) > 6000
