---
# Delete stuck DRPC so live state matches "missing"; ask Argo CD to refresh from source.
# We avoid merge-patching spec.operation (sync): it often fails or is ignored while a sync is already running.
- name: Log DRPC recipe failure recovery
  ansible.builtin.debug:
    msg: >-
      DRPC {{ drpc_name }}/{{ drpc_namespace }} (age {{ drpc_age_minutes }}m, phase not healthy) reports
      '{{ drpc_recipe_failure_phrase }}' within {{ drpc_recipe_failure_max_age_minutes }}m window.
      Deleting DRPC and annotating the Argo CD Application for a hard refresh (no operation sync patch).

- name: Delete DRPC stuck in recipe reconciliation
  ansible.builtin.command:
    argv:
      - oc
      - delete
      - drplacementcontrol
      - "{{ drpc_name }}"
      - -n
      - "{{ drpc_namespace }}"
      - --ignore-not-found=true
  register: drpc_delete_out
  changed_when: drpc_delete_out.rc == 0

- name: Wait for DRPC object to disappear
  ansible.builtin.command:
    argv:
      - oc
      - get
      - drplacementcontrol
      - "{{ drpc_name }}"
      - -n
      - "{{ drpc_namespace }}"
  register: drpc_wait_gone
  until: drpc_wait_gone.rc != 0
  retries: "{{ drpc_delete_wait_retries | int }}"
  delay: "{{ drpc_delete_wait_delay | int }}"
  changed_when: false

- name: Assert DRPC is gone before notifying Argo CD
  ansible.builtin.assert:
    that:
      - drpc_wait_gone.rc != 0
    fail_msg: >-
      DRPC {{ drpc_name }} still exists in {{ drpc_namespace }} after
      {{ drpc_delete_wait_retries }} retries ({{ drpc_delete_wait_delay }}s delay).

- name: Request Argo CD hard refresh (works while a sync is already in flight)
  ansible.builtin.command:
    argv:
      - oc
      - annotate
      - applications.argoproj.io
      - "{{ argocd_app_name }}"
      - -n
      - "{{ argocd_app_namespace }}"
      - argocd.argoproj.io/refresh=hard
      - --overwrite
  register: argo_refresh
  changed_when: argo_refresh.rc == 0
  failed_when: false

- name: Log Argo CD refresh result
  ansible.builtin.debug:
    msg: >-
      Argo CD hard refresh annotation rc={{ argo_refresh.rc | default('n/a') }}
      (Application {{ argocd_app_name }}/{{ argocd_app_namespace }}).
