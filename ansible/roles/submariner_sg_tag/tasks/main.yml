---
- name: Tag Submariner security groups on AWS
  ansible.builtin.command:
    argv:
      - bash
      - "{{ role_path }}/files/submariner-sg-tag.sh"
  register: submariner_sg_tag
  changed_when: false
  failed_when: false

- name: Promote Submariner SG tag script failure to Ansible output
  ansible.builtin.debug:
    msg: |-
      submariner-sg-tag.sh exited with rc={{ submariner_sg_tag.rc }}.
      ========== stderr ==========
      {{ submariner_sg_tag.stderr | default('', true) }}
      ========== stdout (full) ==========
      {{ submariner_sg_tag.stdout | default('', true) }}
  when: submariner_sg_tag.rc != 0

- name: Fail play when Submariner SG tagging failed
  ansible.builtin.fail:
    msg: >-
      Submariner SG tag script exited with rc={{ submariner_sg_tag.rc }}.
      Full stdout/stderr were printed in the previous debug task.
  when: submariner_sg_tag.rc != 0
