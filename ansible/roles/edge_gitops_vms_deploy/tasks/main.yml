---
- name: Ensure Edge GitOps work directory
  ansible.builtin.file:
    path: /tmp/edge-gitops-vms
    state: directory
    mode: "0755"

- name: Copy pattern values into workdir (from mounted ConfigMap)
  ansible.builtin.copy:
    src: /tmp/values/values-egv-dr.yaml
    dest: /tmp/edge-gitops-vms/values-egv-dr.yaml
    remote_src: true
    mode: "0644"

- name: Run Edge GitOps VMs deployment script
  ansible.builtin.command:
    argv:
      - bash
      - "{{ role_path }}/files/edge-gitops-vms-deploy.sh"
  environment:
    PRIMARY_CLUSTER: "{{ primary_cluster }}"
    SECONDARY_CLUSTER: "{{ secondary_cluster }}"
    HELM_CHART_VERSION: "{{ helm_chart_version }}"
  register: edge_gitops_deploy
  changed_when: false
  failed_when: false

- name: Promote Edge GitOps deploy script failure to Ansible output
  ansible.builtin.debug:
    msg: |-
      edge-gitops-vms-deploy.sh exited with rc={{ edge_gitops_deploy.rc }}.
      ========== stderr ==========
      {{ edge_gitops_deploy.stderr | default('', true) }}
      ========== stdout (full) ==========
      {{ edge_gitops_deploy.stdout | default('', true) }}
  when: edge_gitops_deploy.rc != 0

- name: Fail play when Edge GitOps deploy failed
  ansible.builtin.fail:
    msg: >-
      Edge GitOps VMs deploy script exited with rc={{ edge_gitops_deploy.rc }}.
      Full stdout/stderr were printed in the previous debug task.
  when: edge_gitops_deploy.rc != 0

- name: Optional boutique chart (same job as edge-gitops-vms)
  when: boutique_deploy | string | lower in ['true', '1', 'yes']
  block:
    - name: Run boutique chart on primary/placement target
      ansible.builtin.command:
        argv:
          - bash
          - "{{ role_path }}/files/boutique-chart-deploy.sh"
      environment:
        PRIMARY_CLUSTER: "{{ primary_cluster }}"
        SECONDARY_CLUSTER: "{{ secondary_cluster }}"
        BOUTIQUE_DEPLOY: "true"
        BOUTIQUE_NAMESPACE: "{{ boutique_namespace }}"
        BOUTIQUE_CHART_VERSION: "{{ boutique_chart_version }}"
        BOUTIQUE_CHART_NAME: "{{ boutique_chart_name }}"
        BOUTIQUE_HELM_REPO_URL: "{{ boutique_helm_repo_url }}"
        BOUTIQUE_HELM_REPO_ALIAS: "{{ boutique_helm_repo_alias }}"
        BOUTIQUE_VALUES_FILE: "{{ boutique_values_file }}"
      register: boutique_deploy_out
      changed_when: false

    - name: Boutique deploy failure details
      ansible.builtin.debug:
        msg: |-
          boutique-chart-deploy.sh rc={{ boutique_deploy_out.rc }}
          --- stderr ---
          {{ boutique_deploy_out.stderr | default('', true) }}
          --- stdout ---
          {{ boutique_deploy_out.stdout | default('', true) }}
      when: boutique_deploy_out.rc != 0

    - name: Fail when boutique deploy failed
      ansible.builtin.fail:
        msg: Boutique chart deploy failed (see previous debug).
      when: boutique_deploy_out.rc != 0
