{{- $t := .Values.odfRamenTrustedCa | default dict }}
apiVersion: batch/v1
kind: Job
metadata:
  name: odf-ramen-trusted-ca
  namespace: open-cluster-management
  labels:
    app.kubernetes.io/name: odf-ramen-trusted-ca
    app.kubernetes.io/component: ramen-hub-ca
  annotations:
    # After MirrorPeer + DRPolicy (wave 8); before DRPC — requires s3StoreProfiles and cluster-proxy-ca-bundle
    argocd.argoproj.io/sync-wave: "9"
    argocd.argoproj.io/sync-options: Prune=false
    argocd.argoproj.io/compare-options: IgnoreExtraneous
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 14400
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: odf-ramen-trusted-ca
      containers:
      - name: odf-ramen-trusted-ca
        image: {{ $.Values.ansible.containerImage }}
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        env:
        - name: PRIMARY_CLUSTER
          value: {{ include "rdr.primaryClusterName" . | quote }}
        - name: SECONDARY_CLUSTER
          value: {{ include "rdr.secondaryClusterName" . | quote }}
        - name: RAMEN_CM_WAIT_SECONDS
          value: {{ $t.ramenS3WaitSeconds | default 3600 | quote }}
        - name: TRUSTED_CA_WAIT_SECONDS
          value: {{ $t.trustedCaWaitSeconds | default 3600 | quote }}
        - name: POLL_INTERVAL
          value: {{ $t.pollInterval | default 15 | quote }}
        - name: KUBECONFIG
          value: ""
        command:
        - /bin/bash
        - -c
        - |
{{ include "rdr.ansibleBootstrap" . | indent 10 }}
            ansible-playbook -i inventory/hosts playbooks/odf_ramen_trusted_ca.yml \
              -e "odf_ramen_s3_wait_seconds=${RAMEN_CM_WAIT_SECONDS:-3600}" \
              -e "odf_ramen_trusted_ca_wait_seconds=${TRUSTED_CA_WAIT_SECONDS:-3600}" \
              -e "odf_ramen_poll_interval=${POLL_INTERVAL:-15}"
        volumeMounts:
        - name: ansible
          mountPath: /ansible-cm
          readOnly: true
      volumes:
      - name: ansible
        configMap:
          name: regionaldr-ansible
