---
apiVersion: v1
kind: ConfigMap
metadata:
  name: regionaldr-ansible
  namespace: open-cluster-management
  labels:
    app.kubernetes.io/name: regionaldr-ansible
  annotations:
    # Wave -1: before wave 0 cluster resources. When OutOfSync, must converge (see configMapArgoSyncOptions).
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/sync-options: {{ include "rdr.ansibleConfigMapArgoSyncOptions" . | quote }}
    regionaldr-with-virt/ansible-checksum: {{ include "rdr.ansibleConfigChecksum" . | quote }}
data:
{{- $paths := list }}
{{- range $path, $_ := .Files.Glob "ansible/**" }}
{{- if not (hasPrefix "ansible/." $path) }}
{{- $paths = append $paths $path }}
{{- end }}
{{- end }}
{{- range $path := $paths | sortAlpha }}
  {{- $key := $path | trimPrefix "ansible/" | replace "/" "__" }}
  {{- $body := $.Files.Get $path | toString | trimSuffix "\n" }}
  {{ $key }}: |
{{ $body | nindent 4 }}
{{- end }}
