{{- /* Hub DRCluster CRs when ODF chart automation is off (no MirrorPeer); DRPolicy still references these managed cluster names. */}}
{{- if ne "1" (include "rdr.odfPostInstallFixesEnabled" . | trim) }}
{{- $odf := .Values.odf | default dict }}
{{- $dc := index $odf "drCluster" | default dict }}
{{- $pS3 := index $dc "primaryS3ProfileName" | default "" | toString }}
{{- $sS3 := index $dc "secondaryS3ProfileName" | default "" | toString }}
{{- if or (eq $pS3 "") (eq $sS3 "") }}
{{- fail "When odf.postInstallFixesEnabled is false, set odf.drCluster.primaryS3ProfileName and odf.drCluster.secondaryS3ProfileName to the hub Ramen S3 profile names for each cluster." }}
{{- end }}
{{- $primary := include "rdr.primaryClusterName" . }}
{{- $secondary := include "rdr.secondaryClusterName" . }}
---
apiVersion: ramendr.openshift.io/v1alpha1
kind: DRCluster
metadata:
  name: {{ $primary }}
  labels:
    cluster.open-cluster-management.io/backup: ramen
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  s3ProfileName: {{ $pS3 | quote }}
---
apiVersion: ramendr.openshift.io/v1alpha1
kind: DRCluster
metadata:
  name: {{ $secondary }}
  labels:
    cluster.open-cluster-management.io/backup: ramen
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  s3ProfileName: {{ $sS3 | quote }}
{{- end }}
