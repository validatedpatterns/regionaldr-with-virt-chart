apiVersion: batch/v1
kind: Job
metadata:
  name: submariner-prerequisites-checker
  namespace: open-cluster-management
  labels:
    app.kubernetes.io/name: submariner-prerequisites
    app.kubernetes.io/component: health-check
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  backoffLimit: 50
  activeDeadlineSeconds: 14400
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: prerequisites-checker
        image: quay.io/validatedpatterns/utility-container:latest
        env:
        - name: PRIMARY_CLUSTER
          value: {{ include "rdr.primaryClusterName" . | quote }}
        - name: SECONDARY_CLUSTER
          value: {{ include "rdr.secondaryClusterName" . | quote }}
        - name: SUBMARINER_BROKER_NAMESPACE
          value: {{ include "rdr.submarinerBrokerNamespace" . | quote }}
        command:
        - /bin/bash
        - -c
        - |
{{ include "rdr.ansibleBootstrap" . | indent 10 }}
            ansible-playbook -i inventory/hosts playbooks/submariner_prerequisites.yml \
              -e "primary_cluster=${PRIMARY_CLUSTER}" \
              -e "secondary_cluster=${SECONDARY_CLUSTER}" \
              -e "submariner_broker_namespace=${SUBMARINER_BROKER_NAMESPACE}"
        volumeMounts:
        - name: ansible
          mountPath: /ansible-cm
          readOnly: true
      volumes:
      - name: ansible
        configMap:
          name: regionaldr-ansible
      serviceAccountName: submariner-prerequisites-checker
