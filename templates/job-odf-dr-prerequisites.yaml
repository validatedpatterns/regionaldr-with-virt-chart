apiVersion: batch/v1
kind: Job
metadata:
  name: odf-dr-prerequisites-checker
  namespace: open-cluster-management
  labels:
    app.kubernetes.io/name: odf-dr-prerequisites
    app.kubernetes.io/component: health-check
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  backoffLimit: 50
  activeDeadlineSeconds: 14400
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: prerequisites-checker
        image: {{ $.Values.ansible.containerImage }}
        env:
        - name: PRIMARY_CLUSTER
          value: {{ include "rdr.primaryClusterName" . | quote }}
        - name: SECONDARY_CLUSTER
          value: {{ include "rdr.secondaryClusterName" . | quote }}
        command:
        - /bin/bash
        - -c
        - |
{{ include "rdr.ansibleStageOnly" . | indent 10 }}
            export PRIMARY_CLUSTER SECONDARY_CLUSTER
            ODF_SCRIPT="$STAGE/roles/odf_dr_prerequisites/files/odf-dr-prerequisites-check.sh"
            echo "Running ODF prerequisites script with line-buffered output (kubectl logs -f will show progress)."
            if command -v stdbuf >/dev/null 2>&1; then
              exec stdbuf -oL -eL bash "$ODF_SCRIPT"
            else
              exec bash "$ODF_SCRIPT"
            fi
        volumeMounts:
        - name: ansible
          mountPath: /ansible-cm
          readOnly: true
      volumes:
      - name: ansible
        configMap:
          name: regionaldr-ansible
      serviceAccountName: odf-dr-prerequisites-checker
