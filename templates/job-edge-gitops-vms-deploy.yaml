{{- $b := .Values.boutique | default dict }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: edge-gitops-vms-values
  namespace: open-cluster-management
  labels:
    app.kubernetes.io/name: edge-gitops-vms
    app.kubernetes.io/component: deployment
  annotations:
    argocd.argoproj.io/sync-wave: "11"
data:
  values-egv-dr.yaml: |
{{ .Values | toYaml | indent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: edge-gitops-vms-deploy
  namespace: open-cluster-management
  labels:
    app.kubernetes.io/name: edge-gitops-vms
    app.kubernetes.io/component: deployment
  annotations:
    argocd.argoproj.io/sync-wave: "11"
    argocd.argoproj.io/sync-options: Prune=false
    argocd.argoproj.io/compare-options: IgnoreExtraneous
    argocd.argoproj.io/hook: "PostSync"
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 1800
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: edge-gitops-vms-deploy-sa
      restartPolicy: Never
      containers:
      - name: edge-gitops-vms-deploy
        image: {{ $.Values.ansible.containerImage }}
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        command:
        - /bin/bash
        - -c
        - |
{{ include "rdr.ansibleBootstrap" . | indent 10 }}
            ansible-playbook -i inventory/hosts playbooks/edge_gitops_vms_deploy.yml \
              -e "primary_cluster=${PRIMARY_CLUSTER}" \
              -e "secondary_cluster=${SECONDARY_CLUSTER}" \
              -e "helm_chart_version=${HELM_CHART_VERSION:-0.2.10}"
        volumeMounts:
        - name: values
          mountPath: /tmp/values
          readOnly: true
        - name: ansible
          mountPath: /ansible-cm
          readOnly: true
        env:
        - name: KUBECONFIG
          value: ""
        - name: PRIMARY_CLUSTER
          value: {{ include "rdr.primaryClusterName" . | quote }}
        - name: SECONDARY_CLUSTER
          value: {{ include "rdr.secondaryClusterName" . | quote }}
        - name: HELM_CHART_VERSION
          value: {{ index (index .Values "edgeGitopsVms" | default dict) "chartVersion" | default "0.2.10" | quote }}
        - name: BOUTIQUE_DEPLOY
          value: {{ if $b.deploy }}"true"{{ else }}"false"{{ end }}
        - name: BOUTIQUE_NAMESPACE
          value: {{ $b.namespace | default "boutique" | quote }}
        - name: BOUTIQUE_CHART_VERSION
          value: {{ $b.chartVersion | default "0.0.4" | quote }}
        - name: BOUTIQUE_CHART_NAME
          value: {{ $b.chartName | default "boutique" | quote }}
        - name: BOUTIQUE_HELM_REPO_URL
          value: {{ $b.helmRepoUrl | default "https://charts.validatedpatterns.io" | quote }}
        - name: BOUTIQUE_HELM_REPO_ALIAS
          value: {{ $b.helmRepoAlias | default "validatedpatterns" | quote }}
      volumes:
      - name: values
        configMap:
          name: edge-gitops-vms-values
      - name: ansible
        configMap:
          name: regionaldr-ansible
